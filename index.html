<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Спряжение арабских глаголов</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="app">
    <header class="header fade-in">
      <h1>Спряжение <span class="arabic">глаголов</span></h1>
      <p>Арабские глаголы с тренировкой</p>
    </header>

    <section class="card fade-in">
      <div class="font-row">
        <span>Размер арабского шрифта</span>
        <span id="fontValue">54px</span>
      </div>

      <label class="sr-only" for="fontRange">Размер арабского шрифта</label>
      <input
        id="fontRange"
        type="range"
        min="36"
        max="88"
        value="54"
        aria-label="Размер арабского шрифта"
      />
    </section>

    <section class="card verb-card fade-in">
      <label class="sr-only" for="verbSearch">Поиск глагола</label>
      <input
        id="verbSearch"
        class="search-input"
        type="search"
        placeholder="Поиск глагола"
        aria-label="Поиск глагола"
      />

      <div id="searchResults" class="search-results"></div>

      <div id="mainVerb" class="arabic main-verb"></div>
      <div id="mainTranslation" class="translation"></div>

      <button class="btn btn-yellow-outline" id="favoriteBtn">
        Добавить в избранное
      </button>

      <label class="sr-only" for="tenseSelect">Выбор времени</label>
      <select id="tenseSelect" class="select" aria-label="Выбор времени">
        <option value="past">Прошедшее время</option>
        <option value="present">Настоящее время</option>
        <option value="future">Будущее время</option>
      </select>
    </section>

    <section class="card favorites-card fade-in">
      <div class="section-head">
        <h2>Избранное</h2>
        <span id="favoritesCount">0</span>
      </div>

      <div id="favoritesList" class="favorites-list">
        Пока пусто
      </div>
    </section>

    <section class="card conjugation-card fade-in">
      <h2>Спряжения</h2>
      <div id="conjugationList" class="conjugation-list"></div>
    </section>

    <section class="controls fade-in">
      <button class="btn btn-dark" id="prevBtn">Назад</button>
      <button class="btn btn-dark" id="nextBtn">Далее</button>
    </section>

    <section class="mode-buttons fade-in">
      <button class="btn btn-yellow" id="learnBtn">Заучивание</button>
      <button class="btn btn-yellow-outline" id="testBtn">Тест</button>
    </section>

    <section class="card settings-card fade-in">
      <h2>Настройки тренировки</h2>

      <label for="practiceSource">Источник слов</label>
      <select id="practiceSource" class="select">
        <option value="all">Все глаголы</option>
        <option value="favorites">Только избранные</option>
      </select>

      <label for="practiceTense">Время</label>
      <select id="practiceTense" class="select">
        <option value="all">Все времена</option>
        <option value="past">Прошедшее</option>
        <option value="present">Настоящее</option>
        <option value="future">Будущее</option>
      </select>

      <label for="practiceDirection">Тип вопроса</label>
      <select id="practiceDirection" class="select">
        <option value="form-to-pronoun">Форма → местоимение</option>
        <option value="pronoun-to-form">Местоимение → форма</option>
        <option value="typing">Ввести ответ руками</option>
      </select>
    </section>

    <section id="learnPanel" class="card panel">
      <div class="panel-title">Заучивание</div>

      <div class="top-info">
        <span>Ответы: <span id="learnScore">0 / 0</span></span>
      </div>

      <div id="learnQuestion" class="arabic question"></div>
      <div id="learnAnswers" class="answer-grid"></div>

      <button class="btn btn-gray" onclick="closePanels()">Закрыть</button>
    </section>

    <section id="testPanel" class="card panel">
      <div class="panel-title">Тест</div>

      <div class="test-settings">
        <label for="testTime">Время теста</label>
        <select id="testTime" class="select small-select">
          <option value="60">1 мин</option>
          <option value="120" selected>2 мин</option>
          <option value="180">3 мин</option>
          <option value="300">5 мин</option>
        </select>
      </div>

      <div class="top-info">
        <span>Время: <span id="timer">2:00</span></span>
        <span>Ответы: <span id="testScore">0 / 0</span></span>
      </div>

      <div id="testQuestion" class="arabic question"></div>
      <div id="testAnswers" class="answer-grid"></div>

      <section class="controls">
        <button class="btn btn-red" id="finishTest">Завершить</button>
        <button class="btn btn-gray" id="skipTest">Начать заново</button>
      </section>

      <button class="btn btn-gray" onclick="closePanels()">Закрыть</button>
    </section>
  </main>

  <script src="verbs.js"></script>
  <script src="app.js"></script>
</body>
</html>
